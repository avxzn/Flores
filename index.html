<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 🤍</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#0f0f1a, #1a1a2e);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 50px;
      font-size: 30px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .flower {
      position: absolute;
      width: 20px;
      height: 20px;
      background: pink;
      border-radius: 50%;
      animation: float 6s infinite ease-in;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Para ti 🤍</h1>
  <p>Eres muy especial para mí</p>

  <button onclick="mostrarMensaje()">Presiona aquí</button>

  <script>
    function mostrarMensaje() {
      alert("Te quiero 🤍");
    }

    function crearFlor() {
      const flor = document.createElement("div");
      flor.classList.add("flower");
      flor.style.left = Math.random() * 100 + "vw";
      flor.style.background = ["#ffb6c1","#ffc0cb","#ff69b4"][Math.floor(Math.random()*3)];
      document.body.appendChild(flor);

      setTimeout(() => {
        flor.remove();
      }, 6000);
    }

    setInterval(crearFlor, 300);
  </script>

</body>
</html>
